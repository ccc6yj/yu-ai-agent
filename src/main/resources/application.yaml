spring:
  application:
    name: yu-ai-agent
  ai:
    anthropic:
      base-url: your api base url
      api-key: your api key
      chat:
        options:
          model: claude-opus-4-5-20251101
    dashscope:
        api-key: sk-

server:
  port: 8123
  servlet:
    context-path: /api
# springdoc-openapi
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs
  group-configs:
    - group: 'default'
      paths-to-match: '/**'
      packages-to-scan: com.yujian.yuaiagent.controller
# knife4j
knife4j:
  enable: true
  setting:
    language: zh_cn

